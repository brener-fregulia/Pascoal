name: Bug Report
description: Something in Pascoal is not working as expected.
title: "[Bug] "
labels: ["bug", "needs triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.
        If your issue is about Pascal compilation or runtime (FPC errors, readln, output), use the Compiler / Runtime Issue template instead.

  - type: input
    id: pascoal_version
    attributes:
      label: Pascoal version
      placeholder: "e.g. 0.20.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Ubuntu / Debian
        - Arch / CachyOS
        - macOS
        - Other Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How did you install Pascoal?
      options:
        - Built from source (cargo tauri build)
        - .exe installer (Windows)
        - .msi (Windows)
        - .deb (Linux)
        - .AppImage (Linux)
        - Other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Pascoal
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Always (100%)
        - Most of the time
        - Sometimes
        - Rarely / once
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any error messages, stack traces, or attach screenshots.
      render: shell