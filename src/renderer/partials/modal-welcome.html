<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-header">
      <div class="modal-logo">{{app.name}}</div>
      <div class="modal-subtitle">{{modal.welcome.subtitle}}</div>
    </div>
    <p>{{{modal.welcome.p1}}}</p>
    <p>{{{modal.welcome.p2}}}</p>
    <p class="modal-note">{{{modal.welcome.note}}}</p>
    <button id="modal-close">{{modal.welcome.btn_start}}</button>
  </div>
</div>
