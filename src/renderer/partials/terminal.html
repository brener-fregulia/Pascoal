<div class="panel-header">
  <span class="panel-title">{{terminal.panel_title}}</span>
  <div style="display:flex; gap:8px;">
    <button class="clear-btn" id="clear-btn">{{terminal.btn_clear}}</button>
    <button class="run-btn" id="run-btn">&#9654; {{terminal.btn_run}}</button>
  </div>
</div>
<div id="terminal-output">
  <span class="line-dim">{{terminal.hint}}</span>
  <br>
  <span class="line-dim">{{terminal.hint2}}</span>
  <br>
</div>
<div class="terminal-input-row">
  <span class="terminal-prompt">›</span>
  <input type="text" id="terminal-input" placeholder="{{terminal.input_placeholder}}" />
</div>
